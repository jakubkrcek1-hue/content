<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Content Planner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:'DM Sans',system-ui,sans-serif;background:#0d0d0d;color:#f0ede8;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px;}
.app{display:flex;height:100vh;overflow:hidden;}

/* LEFT */
.left{width:320px;flex-shrink:0;border-right:1px solid rgba(255,255,255,0.07);display:flex;flex-direction:column;overflow:hidden;}
.left-header{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,0.07);}
.section-label{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:#555;font-weight:600;margin-bottom:14px;}
.type-tabs{display:flex;gap:6px;margin-bottom:12px;}
.type-tab{font-size:12px;padding:5px 11px;border-radius:20px;cursor:pointer;font-family:inherit;font-weight:600;background:transparent;border:1px solid rgba(255,255,255,0.1);color:#666;transition:all 0.15s;}
.type-tab.active-reel{background:rgba(249,115,22,0.15);border-color:#f97316;color:#f97316;}
.type-tab.active-carousel{background:rgba(129,140,248,0.15);border-color:#818cf8;color:#818cf8;}
.type-tab.active-story{background:rgba(52,211,153,0.15);border-color:#34d399;color:#34d399;}
textarea{width:100%;background:#1c1c1c;border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#f0ede8;font-size:13px;padding:9px 11px;resize:none;font-family:inherit;line-height:1.5;outline:none;margin-bottom:8px;}
textarea:focus{border-color:rgba(200,245,101,0.5);}
textarea::placeholder{color:#444;}
.add-btn{width:100%;background:#c8f565;color:#0d0d0d;border:none;border-radius:8px;font-size:13px;font-weight:700;padding:10px 14px;cursor:pointer;font-family:inherit;transition:opacity 0.15s;}
.add-btn:hover{opacity:0.85;}

.view-toggle{display:flex;border-bottom:1px solid rgba(255,255,255,0.07);flex-shrink:0;}
.view-btn{flex:1;background:transparent;border:none;border-bottom:2px solid transparent;color:#555;font-size:11px;font-family:inherit;font-weight:600;padding:10px 6px;cursor:pointer;letter-spacing:0.06em;text-transform:uppercase;transition:all 0.15s;}
.view-btn.active{color:#f0ede8;border-bottom-color:#c8f565;}
.pill{display:inline-flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.07);border-radius:10px;font-size:10px;padding:1px 6px;margin-left:4px;}
.pill.red{background:rgba(248,113,113,0.15);color:#f87171;}

.ideas-list{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px;}
.empty-msg{text-align:center;color:#444;font-size:13px;padding-top:40px;line-height:1.9;}

/* IDEA CARD */
.idea-card{background:#191919;border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:12px 14px 28px 14px;cursor:grab;position:relative;transition:border-color 0.2s,box-shadow 0.2s,opacity 0.2s;}
.idea-card:hover{border-color:rgba(255,255,255,0.15);}
.idea-card.scheduled{opacity:0.5;}
.idea-card.dragging{opacity:0.25;transform:scale(0.97);}
.idea-card.trashed{cursor:default;border-color:rgba(248,113,113,0.12);background:#181212;}
.idea-card.glow-reel{border-color:#f97316;box-shadow:0 0 0 1px rgba(249,115,22,0.3),0 0 12px rgba(249,115,22,0.15);}
.idea-card.glow-carousel{border-color:#818cf8;box-shadow:0 0 0 1px rgba(129,140,248,0.3),0 0 12px rgba(129,140,248,0.15);}
.idea-card.glow-story{border-color:#34d399;box-shadow:0 0 0 1px rgba(52,211,153,0.3),0 0 12px rgba(52,211,153,0.15);}
.card-emoji{position:absolute;bottom:8px;right:11px;font-size:16px;line-height:1;opacity:0.55;pointer-events:none;}

.card-actions{position:absolute;top:9px;right:9px;display:flex;gap:3px;opacity:0;transition:opacity 0.15s;}
.idea-card:hover .card-actions{opacity:1;}
.icon-btn{background:transparent;border:1px solid rgba(255,255,255,0.08);color:#555;cursor:pointer;font-size:11px;padding:3px 7px;border-radius:5px;line-height:1.3;transition:all 0.15s;font-family:inherit;white-space:nowrap;}
.icon-btn:hover{border-color:rgba(255,255,255,0.2);color:#f0ede8;}
.icon-btn.restore:hover{border-color:#c8f565;color:#c8f565;}
.icon-btn.perm:hover{border-color:#f87171;color:#f87171;}

.type-picker{display:flex;gap:4px;margin-bottom:8px;align-items:center;}
.type-mini{font-size:10px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;padding:3px 8px;border-radius:20px;cursor:pointer;border:1px solid rgba(255,255,255,0.08);transition:all 0.15s;font-family:inherit;background:transparent;}
.type-mini.tm-reel{color:rgba(249,115,22,0.35);}
.type-mini.tm-carousel{color:rgba(129,140,248,0.35);}
.type-mini.tm-story{color:rgba(52,211,153,0.35);}
.type-mini:hover{border-color:rgba(255,255,255,0.15);}
.type-mini.tm-reel:hover{color:rgba(249,115,22,0.7);}
.type-mini.tm-carousel:hover{color:rgba(129,140,248,0.7);}
.type-mini.tm-story:hover{color:rgba(52,211,153,0.7);}
.type-mini.tm-reel.sel{background:rgba(249,115,22,0.15);color:#f97316;border-color:rgba(249,115,22,0.4);}
.type-mini.tm-carousel.sel{background:rgba(129,140,248,0.15);color:#818cf8;border-color:rgba(129,140,248,0.4);}
.type-mini.tm-story.sel{background:rgba(52,211,153,0.15);color:#34d399;border-color:rgba(52,211,153,0.4);}

/* editable fields on idea card */
.idea-text-display{font-size:13px;line-height:1.5;padding-right:70px;}
.idea-text-display:hover{color:#ddd;}
.idea-note-display{font-size:11px;color:#555;margin-top:4px;}
.idea-note-display:hover{color:#777;}
.idea-edit-textarea{width:100%;background:#111;border:1px solid rgba(255,255,255,0.15);border-radius:6px;color:#f0ede8;font-size:13px;padding:6px 8px;resize:none;font-family:inherit;line-height:1.5;outline:none;margin-top:2px;}
.idea-edit-textarea:focus{border-color:rgba(200,245,101,0.4);}
.idea-edit-note{font-size:11px;color:#888;padding:5px 8px;}

.idea-scheduled-tag{font-size:10px;color:#c8f565;margin-top:6px;}
.trash-tag{font-size:10px;color:#f87171;margin-top:5px;}

/* RIGHT */
.right{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;}
.cal-header{padding:20px 24px 16px;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:space-between;}
.month-nav{display:flex;align-items:center;gap:12px;}
.nav-btn{background:#1c1c1c;border:1px solid rgba(255,255,255,0.1);color:#f0ede8;border-radius:7px;width:30px;height:30px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:border-color 0.15s;font-family:inherit;}
.nav-btn:hover{border-color:#c8f565;}
.month-label{font-size:16px;font-weight:500;min-width:160px;text-align:center;}
.legend{display:flex;gap:14px;align-items:center;}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#555;}

.cal-wrap{flex:1;overflow-y:auto;padding:12px 20px 20px;}
.dow-row{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:6px;}
.dow{font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:#444;text-align:center;padding:4px 0;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}

.cal-day{background:#191919;border:1px solid rgba(255,255,255,0.07);border-radius:9px;min-height:88px;padding:6px 7px;display:flex;flex-direction:column;gap:3px;transition:border-color 0.15s,background 0.15s;position:relative;overflow:hidden;cursor:pointer;}
.cal-day.other-month{opacity:0.18;pointer-events:none;}
.cal-day.is-today{border-color:#c8f565;}
.cal-day.drag-over{border-color:rgba(200,245,101,0.6);background:rgba(200,245,101,0.04);}
.cal-day.is-done{background:#111a12;border-color:rgba(52,211,153,0.3);}
.cal-day:not(.other-month):hover{border-color:rgba(255,255,255,0.18);}

.day-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px;flex-shrink:0;}
.day-num{font-size:11px;color:#555;font-weight:500;line-height:1;}
.cal-day.is-today .day-num{color:#c8f565;font-weight:700;}
.cal-day.is-done .day-num{color:#34d399;}

.done-btn{background:transparent;border:1px solid rgba(255,255,255,0.07);border-radius:4px;color:#444;cursor:pointer;font-size:9px;padding:2px 5px;font-family:inherit;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;transition:all 0.15s;line-height:1.4;white-space:nowrap;}
.done-btn:hover{border-color:#34d399;color:#34d399;}
.cal-day.is-done .done-btn{background:rgba(52,211,153,0.15);border-color:rgba(52,211,153,0.5);color:#34d399;}

/* cal card — strict overflow control */
.cal-card{border-radius:5px;padding:3px 6px;font-size:11px;line-height:1.3;display:flex;align-items:center;gap:4px;cursor:grab;width:100%;overflow:hidden;flex-shrink:0;}
.cal-card.type-reel{background:rgba(249,115,22,0.14);color:#f97316;border-left:2px solid #f97316;}
.cal-card.type-carousel{background:rgba(129,140,248,0.14);color:#818cf8;border-left:2px solid #818cf8;}
.cal-card.type-story{background:rgba(52,211,153,0.14);color:#34d399;border-left:2px solid #34d399;}
.cal-card.cal-dragging{opacity:0.3;}
.cal-card-emoji{font-size:10px;flex-shrink:0;line-height:1;}
.cal-card-text{flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;min-width:0;}
.cal-remove{background:transparent;border:none;color:inherit;cursor:pointer;font-size:10px;opacity:0;padding:0;line-height:1;flex-shrink:0;transition:opacity 0.15s;font-family:inherit;}
.cal-card:hover .cal-remove{opacity:0.6;}
.cal-remove:hover{opacity:1!important;}
.done-tick{position:absolute;bottom:5px;right:7px;font-size:14px;color:#34d399;opacity:0.18;pointer-events:none;}
.more-badge{font-size:9px;color:#666;padding:2px 0 0 2px;flex-shrink:0;}

/* DAY DETAIL PANEL */
.detail-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.6);z-index:100;display:none;align-items:flex-start;justify-content:flex-end;}
.detail-overlay.open{display:flex;}
.detail-panel{width:340px;height:100%;background:#161616;border-left:1px solid rgba(255,255,255,0.08);display:flex;flex-direction:column;overflow:hidden;}
.detail-header{padding:18px 18px 14px;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.detail-date{font-size:14px;font-weight:600;}
.detail-close{background:transparent;border:1px solid rgba(255,255,255,0.1);color:#888;border-radius:6px;width:28px;height:28px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;font-family:inherit;}
.detail-close:hover{border-color:#f0ede8;color:#f0ede8;}
.detail-done-row{padding:10px 18px;border-bottom:1px solid rgba(255,255,255,0.05);flex-shrink:0;}
.detail-done-btn{background:transparent;border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:#555;cursor:pointer;font-size:11px;padding:5px 12px;font-family:inherit;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;transition:all 0.15s;width:100%;}
.detail-done-btn:hover{border-color:#34d399;color:#34d399;}
.detail-done-btn.active{background:rgba(52,211,153,0.15);border-color:#34d399;color:#34d399;}
.detail-entries{flex:1;overflow-y:auto;padding:14px 18px;display:flex;flex-direction:column;gap:12px;}
.detail-empty{color:#444;font-size:13px;text-align:center;padding-top:30px;}
.detail-card{background:#1f1f1f;border-radius:10px;padding:14px;border:1px solid rgba(255,255,255,0.07);position:relative;}
.detail-card.dc-reel{border-left:3px solid #f97316;}
.detail-card.dc-carousel{border-left:3px solid #818cf8;}
.detail-card.dc-story{border-left:3px solid #34d399;}
.detail-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.detail-type-picker{display:flex;gap:4px;}
.detail-remove{background:transparent;border:none;color:#444;cursor:pointer;font-size:12px;padding:2px 5px;border-radius:4px;transition:color 0.15s;font-family:inherit;}
.detail-remove:hover{color:#f87171;}
.detail-field-label{font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:#555;margin-bottom:5px;font-weight:600;}
.detail-textarea{width:100%;background:#141414;border:1px solid rgba(255,255,255,0.08);border-radius:6px;color:#f0ede8;font-size:13px;padding:8px 10px;resize:none;font-family:inherit;line-height:1.5;outline:none;margin-bottom:10px;}
.detail-textarea:focus{border-color:rgba(200,245,101,0.4);}
.detail-textarea::placeholder{color:#333;}
.detail-save{background:#c8f565;color:#0d0d0d;border:none;border-radius:6px;font-size:11px;font-weight:700;padding:6px 14px;cursor:pointer;font-family:inherit;transition:opacity 0.15s;}
.detail-save:hover{opacity:0.85;}
.detail-saved{font-size:11px;color:#34d399;margin-left:8px;opacity:0;transition:opacity 0.3s;}
.detail-saved.show{opacity:1;}
</style>
</head>
<body>
<div class="app">
  <!-- LEFT -->
  <div class="left">
    <div class="left-header">
      <div class="section-label">Idea bank</div>
      <div class="type-tabs">
        <button class="type-tab active-reel" data-type="reel" onclick="selectType('reel')">Reel</button>
        <button class="type-tab" data-type="carousel" onclick="selectType('carousel')">Carousel</button>
        <button class="type-tab" data-type="story" onclick="selectType('story')">Story</button>
      </div>
      <textarea id="ideaText" rows="3" placeholder="Napiš nápad na obsah..." onkeydown="if((event.metaKey||event.ctrlKey)&&event.key==='Enter')addIdea()"></textarea>
      <textarea id="ideaNote" rows="1" placeholder="Poznámka (volitelné)..."></textarea>
      <button class="add-btn" onclick="addIdea()">+ Přidat nápad</button>
    </div>
    <div class="view-toggle">
      <button class="view-btn active" id="btnIdeas" onclick="setView('ideas')">Nápady <span class="pill" id="ideasCount">0</span></button>
      <button class="view-btn" id="btnTrash" onclick="setView('trash')">Koš <span class="pill red" id="trashCount">0</span></button>
    </div>
    <div class="ideas-list" id="ideasList"></div>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <div class="cal-header">
      <div class="month-nav">
        <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
        <div class="month-label" id="monthLabel"></div>
        <button class="nav-btn" onclick="changeMonth(1)">›</button>
      </div>
      <div class="legend">
        <div class="leg-item"><span style="font-size:12px">🎬</span>Reel</div>
        <div class="leg-item"><span style="font-size:12px">📷</span>Carousel</div>
        <div class="leg-item"><span style="font-size:12px">🤳</span>Story</div>
        <div class="leg-item" style="margin-left:4px;gap:5px;"><div style="width:8px;height:8px;border-radius:2px;background:rgba(52,211,153,0.25);border:1px solid #34d399"></div>Done</div>
      </div>
    </div>
    <div class="cal-wrap">
      <div class="dow-row">
        <div class="dow">Po</div><div class="dow">Út</div><div class="dow">St</div>
        <div class="dow">Čt</div><div class="dow">Pá</div><div class="dow">So</div><div class="dow">Ne</div>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>

    <!-- DAY DETAIL OVERLAY -->
    <div class="detail-overlay" id="detailOverlay" onclick="handleOverlayClick(event)">
      <div class="detail-panel" id="detailPanel">
        <div class="detail-header">
          <div class="detail-date" id="detailDate"></div>
          <button class="detail-close" onclick="closeDetail()">✕</button>
        </div>
        <div class="detail-done-row">
          <button class="detail-done-btn" id="detailDoneBtn" onclick="toggleDetailDone()">Done</button>
        </div>
        <div class="detail-entries" id="detailEntries"></div>
      </div>
    </div>
  </div>
</div>

<script>
const MONTHS=["Leden","Únor","Březen","Duben","Květen","Červen","Červenec","Srpen","Září","Říjen","Listopad","Prosinec"];
const MONTHS_GEN=["ledna","února","března","dubna","května","června","července","srpna","září","října","listopadu","prosince"];
const TYPES=['reel','carousel','story'];
const TYPE_EMOJI={reel:'🎬',carousel:'📷',story:'🤳'};

let selectedType='reel', nextId=10, currentView='ideas';
const today=new Date();
let curMonth=today.getMonth(), curYear=today.getFullYear();
let drag={id:null,fromDate:null};
let detailDateKey=null;

let ideas=JSON.parse(localStorage.getItem('cp_ideas')||'null')||[
  {id:1,type:'reel',text:'Morning routine — timelapse z 5:30 vstupu do gymu',note:'Hudba: lo-fi house',scheduledDate:null,trashed:false},
  {id:2,type:'carousel',text:'5 věcí co mi změnily kompozici těla za rok',note:'',scheduledDate:null,trashed:false},
  {id:3,type:'story',text:'Q&A — co jím před tréninkem',note:'',scheduledDate:null,trashed:false},
];
let scheduled=JSON.parse(localStorage.getItem('cp_scheduled')||'{}');
let doneDays=JSON.parse(localStorage.getItem('cp_done')||'{}');

function save(){
  localStorage.setItem('cp_ideas',JSON.stringify(ideas));
  localStorage.setItem('cp_scheduled',JSON.stringify(scheduled));
  localStorage.setItem('cp_done',JSON.stringify(doneDays));
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function selectType(t){
  selectedType=t;
  document.querySelectorAll('.type-tab').forEach(b=>{b.className='type-tab';if(b.dataset.type===t)b.classList.add('active-'+t);});
}
function setView(v){
  currentView=v;
  document.getElementById('btnIdeas').classList.toggle('active',v==='ideas');
  document.getElementById('btnTrash').classList.toggle('active',v==='trash');
  renderIdeas();
}
function addIdea(){
  const text=document.getElementById('ideaText').value.trim();
  if(!text)return;
  const note=document.getElementById('ideaNote').value.trim();
  ideas.unshift({id:nextId++,type:selectedType,text,note,scheduledDate:null,trashed:false});
  document.getElementById('ideaText').value='';
  document.getElementById('ideaNote').value='';
  save();renderIdeas();
}

function startEditText(id){
  const idea=ideas.find(i=>i.id===id);
  if(!idea||idea.trashed)return;
  const el=document.querySelector(`.idea-text-display[data-id="${id}"]`);
  if(!el)return;
  const ta=document.createElement('textarea');
  ta.className='idea-edit-textarea';
  ta.value=idea.text;
  ta.rows=3;
  el.replaceWith(ta);
  ta.focus();
  ta.select();
  ta.addEventListener('blur',()=>saveEditText(id,ta));
  ta.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();ta.blur();}});
}
function saveEditText(id,ta){
  const val=ta.value.trim();
  const idea=ideas.find(i=>i.id===id);
  if(idea&&val){
    idea.text=val;
    Object.keys(scheduled).forEach(k=>{scheduled[k].forEach(e=>{if(e.id===id)e.text=val;});});
  }
  save();renderIdeas();renderCalendar();
  if(detailDateKey)renderDetail();
}
function startEditNote(id){
  const idea=ideas.find(i=>i.id===id);
  if(!idea||idea.trashed)return;
  const el=document.querySelector(`.idea-note-display[data-id="${id}"]`);
  if(!el)return;
  const ta=document.createElement('textarea');
  ta.className='idea-edit-textarea';
  ta.style.fontSize='11px';
  ta.value=idea.note||'';
  ta.rows=2;
  ta.placeholder='Přidat poznámku...';
  el.replaceWith(ta);
  ta.focus();
  ta.addEventListener('blur',()=>saveEditNote(id,ta));
}
function saveEditNote(id,ta){
  const idea=ideas.find(i=>i.id===id);
  if(idea)idea.note=ta.value.trim();
  save();renderIdeas();
  if(detailDateKey)renderDetail();
}

function changeIdeaType(id,newType){
  const idea=ideas.find(i=>i.id===id);
  if(!idea||idea.type===newType)return;
  idea.type=newType;
  Object.keys(scheduled).forEach(k=>{scheduled[k].forEach(e=>{if(e.id===id)e.type=newType;});});
  save();renderIdeas();renderCalendar();
  if(detailDateKey)renderDetail();
}
function trashIdea(id){
  const idea=ideas.find(i=>i.id===id);
  if(!idea)return;
  idea.trashed=true;
  if(idea.scheduledDate){
    scheduled[idea.scheduledDate]=(scheduled[idea.scheduledDate]||[]).filter(s=>s.id!==id);
    if(!scheduled[idea.scheduledDate].length)delete scheduled[idea.scheduledDate];
    idea.scheduledDate=null;
  }
  save();renderIdeas();renderCalendar();
  if(detailDateKey)renderDetail();
}
function restoreIdea(id){
  const idea=ideas.find(i=>i.id===id);
  if(!idea)return;
  idea.trashed=false;
  save();renderIdeas();
}
function deleteForever(id){
  if(!confirm('Trvale smazat? Nejde vrátit.'))return;
  ideas=ideas.filter(i=>i.id!==id);
  Object.keys(scheduled).forEach(k=>{scheduled[k]=scheduled[k].filter(s=>s.id!==id);if(!scheduled[k].length)delete scheduled[k];});
  save();renderIdeas();renderCalendar();
  if(detailDateKey)renderDetail();
}
function removeFromCal(dateKey,id){
  scheduled[dateKey]=(scheduled[dateKey]||[]).filter(s=>s.id!==id);
  if(!scheduled[dateKey].length)delete scheduled[dateKey];
  const idea=ideas.find(i=>i.id===id);
  if(idea)idea.scheduledDate=null;
  save();renderIdeas();renderCalendar();
  if(detailDateKey===dateKey)renderDetail();
}
function toggleDone(e,dateKey){
  e.stopPropagation();
  doneDays[dateKey]=!doneDays[dateKey];
  if(!doneDays[dateKey])delete doneDays[dateKey];
  save();renderCalendar();
  if(detailDateKey===dateKey)renderDetailDoneBtn();
}
function toggleDetailDone(){
  if(!detailDateKey)return;
  doneDays[detailDateKey]=!doneDays[detailDateKey];
  if(!doneDays[detailDateKey])delete doneDays[detailDateKey];
  save();renderCalendar();
  renderDetailDoneBtn();
}
function renderDetailDoneBtn(){
  const btn=document.getElementById('detailDoneBtn');
  if(!btn||!detailDateKey)return;
  const isDone=!!doneDays[detailDateKey];
  btn.textContent=isDone?'✓ Splněno — klikni pro vrácení':'Označit jako Done';
  btn.className='detail-done-btn'+(isDone?' active':'');
}

// DRAG
function onIdeaDragStart(e,id){
  drag={id,fromDate:null};
  setTimeout(()=>{const el=document.querySelector(`.idea-card[data-id="${id}"]`);if(el)el.classList.add('dragging');},0);
}
function onIdeaDragEnd(){drag={id:null,fromDate:null};document.querySelectorAll('.idea-card').forEach(c=>c.classList.remove('dragging'));}
function onCalDragStart(e,id,fromDate){
  drag={id,fromDate};e.stopPropagation();
  setTimeout(()=>{const el=document.querySelector(`.cal-card[data-id="${id}"]`);if(el)el.classList.add('cal-dragging');},0);
}
function onCalDragEnd(){drag={id:null,fromDate:null};document.querySelectorAll('.cal-card').forEach(c=>c.classList.remove('cal-dragging'));}
function onDrop(e,toDateKey){
  e.stopPropagation();
  if(!drag.id)return;
  const id=drag.id,fromDate=drag.fromDate;
  const idea=ideas.find(i=>i.id===id);
  if(!idea||idea.trashed){drag={id:null,fromDate:null};return;}
  if(fromDate){
    scheduled[fromDate]=(scheduled[fromDate]||[]).filter(s=>s.id!==id);
    if(!scheduled[fromDate].length)delete scheduled[fromDate];
    idea.scheduledDate=null;
  } else {
    if(idea.scheduledDate){
      scheduled[idea.scheduledDate]=(scheduled[idea.scheduledDate]||[]).filter(s=>s.id!==id);
      if(!scheduled[idea.scheduledDate].length)delete scheduled[idea.scheduledDate];
      idea.scheduledDate=null;
    }
  }
  const already=(scheduled[toDateKey]||[]).some(s=>s.id===id);
  if(!already){
    if(!scheduled[toDateKey])scheduled[toDateKey]=[];
    scheduled[toDateKey].push({id:idea.id,type:idea.type,text:idea.text});
    idea.scheduledDate=toDateKey;
  }
  drag={id:null,fromDate:null};
  save();renderIdeas();renderCalendar();
  if(detailDateKey===toDateKey||detailDateKey===fromDate)renderDetail();
}

// DETAIL
function openDetail(dateKey){
  detailDateKey=dateKey;
  const parts=dateKey.split('-');
  const d=parseInt(parts[2]),m=parseInt(parts[1])-1;
  document.getElementById('detailDate').textContent=`${d}. ${MONTHS_GEN[m]}`;
  renderDetailDoneBtn();
  renderDetail();
  document.getElementById('detailOverlay').classList.add('open');
}
function closeDetail(){
  document.getElementById('detailOverlay').classList.remove('open');
  detailDateKey=null;
}
function handleOverlayClick(e){
  if(e.target===document.getElementById('detailOverlay'))closeDetail();
}

function renderDetail(){
  if(!detailDateKey)return;
  const entries=(scheduled[detailDateKey]||[]).filter(e=>{const idea=ideas.find(i=>i.id===e.id);return idea&&!idea.trashed;});
  const container=document.getElementById('detailEntries');
  if(!entries.length){container.innerHTML='<div class="detail-empty">Žádný obsah na tento den.<br>Přetáhni sem nápad z kalendáře nebo idea banku.</div>';return;}
  container.innerHTML=entries.map(entry=>{
    const idea=ideas.find(i=>i.id===entry.id);
    if(!idea)return'';
    const typePicker=TYPES.map(t=>`
      <button class="type-mini tm-${t}${idea.type===t?' sel':''}"
        onclick="changeIdeaType(${idea.id},'${t}')">${t.charAt(0).toUpperCase()+t.slice(1)}</button>
    `).join('');
    return`<div class="detail-card dc-${esc(idea.type)}">
      <div class="detail-card-top">
        <div class="detail-type-picker">${typePicker}</div>
        <button class="detail-remove" onclick="removeFromCal('${esc(detailDateKey)}',${idea.id})" title="Odebrat z kalendáře">✕</button>
      </div>
      <div class="detail-field-label">Popis</div>
      <textarea class="detail-textarea" rows="3" id="dt-text-${idea.id}" placeholder="Popis nápadu...">${esc(idea.text)}</textarea>
      <div class="detail-field-label">Poznámka</div>
      <textarea class="detail-textarea" rows="2" id="dt-note-${idea.id}" placeholder="Poznámka...">${esc(idea.note||'')}</textarea>
      <div style="display:flex;align-items:center;">
        <button class="detail-save" onclick="saveDetailCard(${idea.id})">Uložit</button>
        <span class="detail-saved" id="ds-${idea.id}">✓ Uloženo</span>
      </div>
    </div>`;
  }).join('');
}

function saveDetailCard(id){
  const idea=ideas.find(i=>i.id===id);
  if(!idea)return;
  const textEl=document.getElementById(`dt-text-${id}`);
  const noteEl=document.getElementById(`dt-note-${id}`);
  if(textEl&&textEl.value.trim()){
    idea.text=textEl.value.trim();
    Object.keys(scheduled).forEach(k=>{scheduled[k].forEach(e=>{if(e.id===id)e.text=idea.text;});});
  }
  if(noteEl)idea.note=noteEl.value.trim();
  save();renderIdeas();renderCalendar();
  // flash saved
  const saved=document.getElementById(`ds-${id}`);
  if(saved){saved.classList.add('show');setTimeout(()=>saved.classList.remove('show'),1800);}
}

function renderIdeas(){
  const list=document.getElementById('ideasList');
  const active=ideas.filter(i=>!i.trashed);
  const trashed=ideas.filter(i=>i.trashed);
  document.getElementById('ideasCount').textContent=active.length;
  document.getElementById('trashCount').textContent=trashed.length;
  const pool=currentView==='trash'?trashed:active;
  if(!pool.length){
    list.innerHTML=currentView==='trash'
      ?'<div class="empty-msg">Koš je prázdný 🎉</div>'
      :'<div class="empty-msg">Zatím žádné nápady.<br>Přidej první výše.</div>';
    return;
  }
  list.innerHTML=pool.map(idea=>{
    const typePicker=TYPES.map(t=>`
      <button class="type-mini tm-${t}${idea.type===t?' sel':''}"
        onclick="changeIdeaType(${idea.id},'${t}')">${t.charAt(0).toUpperCase()+t.slice(1)}</button>
    `).join('');
    const glowClass=idea.trashed?'':'glow-'+idea.type;
    return`<div class="idea-card ${glowClass}${idea.scheduledDate&&!idea.trashed?' scheduled':''}${idea.trashed?' trashed':''}"
      ${!idea.trashed?`draggable="true" ondragstart="onIdeaDragStart(event,${idea.id})" ondragend="onIdeaDragEnd()"`:``}
      data-id="${idea.id}">
      <div class="card-actions">
        ${idea.trashed
          ?`<button class="icon-btn restore" onclick="restoreIdea(${idea.id})">↩ Obnovit</button>
             <button class="icon-btn perm" onclick="deleteForever(${idea.id})">✕</button>`
          :`<button class="icon-btn" onclick="trashIdea(${idea.id})">🗑</button>`}
      </div>
      <div class="type-picker">${typePicker}</div>
      <div class="idea-text-display" data-id="${idea.id}" onclick="startEditText(${idea.id})">${esc(idea.text)}</div>
      <div class="idea-note-display" data-id="${idea.id}" onclick="startEditNote(${idea.id})">${idea.note?esc(idea.note):'<span style="color:#333">+ poznámka</span>'}</div>
      ${idea.scheduledDate&&!idea.trashed?`<div class="idea-scheduled-tag">↗ ${esc(idea.scheduledDate)}</div>`:''}
      ${idea.trashed?`<div class="trash-tag">V koši</div>`:''}
      ${!idea.trashed?`<div class="card-emoji">${TYPE_EMOJI[idea.type]}</div>`:''}
    </div>`;
  }).join('');
}

function changeMonth(dir){
  curMonth+=dir;
  if(curMonth>11){curMonth=0;curYear++;}
  if(curMonth<0){curMonth=11;curYear--;}
  renderCalendar();
}

function renderCalendar(){
  document.getElementById('monthLabel').textContent=MONTHS[curMonth]+' '+curYear;
  const firstDay=new Date(curYear,curMonth,1);
  let startDow=firstDay.getDay();
  startDow=startDow===0?6:startDow-1;
  const daysInMonth=new Date(curYear,curMonth+1,0).getDate();
  const prevDays=new Date(curYear,curMonth,0).getDate();
  let cells=[];
  for(let i=startDow-1;i>=0;i--)cells.push({day:prevDays-i,current:false});
  for(let d=1;d<=daysInMonth;d++)cells.push({day:d,current:true});
  while(cells.length%7!==0)cells.push({day:cells.length-daysInMonth-startDow+1,current:false});

  const MAX_VISIBLE=2; // max cards shown in day cell before +N badge

  document.getElementById('calGrid').innerHTML=cells.map(cell=>{
    if(!cell.current)return`<div class="cal-day other-month"><div class="day-top"><div class="day-num">${cell.day}</div></div></div>`;
    const dateKey=`${curYear}-${String(curMonth+1).padStart(2,'0')}-${String(cell.day).padStart(2,'0')}`;
    const isToday=today.getDate()===cell.day&&today.getMonth()===curMonth&&today.getFullYear()===curYear;
    const isDone=!!doneDays[dateKey];
    const allEntries=(scheduled[dateKey]||[]).filter(e=>{const idea=ideas.find(i=>i.id===e.id);return idea&&!idea.trashed;});
    const visible=allEntries.slice(0,MAX_VISIBLE);
    const extra=allEntries.length-visible.length;
    const cards=visible.map(e=>`
      <div class="cal-card type-${esc(e.type)}" data-id="${e.id}"
        draggable="true"
        ondragstart="onCalDragStart(event,${e.id},'${dateKey}')"
        ondragend="onCalDragEnd()"
        onclick="event.stopPropagation()">
        <span class="cal-card-emoji">${TYPE_EMOJI[e.type]}</span>
        <span class="cal-card-text">${esc(e.text)}</span>
        <button class="cal-remove" onclick="event.stopPropagation();removeFromCal('${esc(dateKey)}',${e.id})">✕</button>
      </div>`).join('');
    const extraBadge=extra>0?`<div class="more-badge">+${extra} další</div>`:'';
    return`<div class="cal-day${isToday?' is-today':''}${isDone?' is-done':''}"
      ondragover="event.preventDefault();this.classList.add('drag-over')"
      ondragleave="this.classList.remove('drag-over')"
      ondrop="this.classList.remove('drag-over');onDrop(event,'${dateKey}')"
      onclick="openDetail('${dateKey}')">
      <div class="day-top">
        <div class="day-num">${cell.day}</div>
        <button class="done-btn" onclick="toggleDone(event,'${dateKey}')">${isDone?'✓ Done':'Done'}</button>
      </div>
      ${cards}${extraBadge}
      ${isDone?'<div class="done-tick">✓</div>':''}
    </div>`;
  }).join('');
}

renderIdeas();
renderCalendar();
</script>
</body>
</html>
