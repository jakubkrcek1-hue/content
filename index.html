<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Content Planner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:'DM Sans',system-ui,sans-serif;background:#0d0d0d;color:#f0ede8;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px;}
.app{display:flex;height:100vh;overflow:hidden;}

/* ── LEFT PANEL ── */
.left{width:310px;flex-shrink:0;border-right:1px solid rgba(255,255,255,0.07);display:flex;flex-direction:column;overflow:hidden;}
.left-header{padding:16px 14px 12px;border-bottom:1px solid rgba(255,255,255,0.07);}
.section-label{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:#555;font-weight:600;margin-bottom:10px;}
.type-tabs{display:flex;gap:5px;margin-bottom:10px;}
.type-tab{font-size:11px;padding:4px 10px;border-radius:20px;cursor:pointer;font-family:inherit;font-weight:600;background:transparent;border:1px solid rgba(255,255,255,0.1);color:#666;transition:all 0.15s;}
.type-tab.active-reel{background:rgba(249,115,22,0.15);border-color:#f97316;color:#f97316;}
.type-tab.active-carousel{background:rgba(129,140,248,0.15);border-color:#818cf8;color:#818cf8;}
.type-tab.active-story{background:rgba(52,211,153,0.15);border-color:#34d399;color:#34d399;}
.new-idea-input{width:100%;background:#1c1c1c;border:1px solid rgba(255,255,255,0.1);border-radius:7px;color:#f0ede8;font-size:12px;padding:7px 10px;resize:none;font-family:inherit;line-height:1.4;outline:none;margin-bottom:7px;}
.new-idea-input:focus{border-color:rgba(200,245,101,0.4);}
.new-idea-input::placeholder{color:#3a3a3a;}
.add-btn{width:100%;background:#c8f565;color:#0d0d0d;border:none;border-radius:7px;font-size:12px;font-weight:700;padding:8px;cursor:pointer;font-family:inherit;transition:opacity 0.15s;}
.add-btn:hover{opacity:0.85;}

.view-toggle{display:flex;border-bottom:1px solid rgba(255,255,255,0.07);flex-shrink:0;}
.view-btn{flex:1;background:transparent;border:none;border-bottom:2px solid transparent;color:#555;font-size:10px;font-family:inherit;font-weight:600;padding:8px 4px;cursor:pointer;letter-spacing:0.06em;text-transform:uppercase;transition:all 0.15s;}
.view-btn.active{color:#f0ede8;border-bottom-color:#c8f565;}
.pill{display:inline-flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.07);border-radius:10px;font-size:9px;padding:1px 5px;margin-left:3px;}
.pill.red{background:rgba(248,113,113,0.15);color:#f87171;}

/* ── IDEA GRID — 2 columns ── */
.ideas-grid{flex:1;overflow-y:auto;padding:10px;display:grid;grid-template-columns:1fr 1fr;gap:7px;align-content:start;}
.empty-msg{grid-column:1/-1;text-align:center;color:#444;font-size:12px;padding-top:30px;line-height:1.9;}

/* compact idea card */
.idea-card{background:#191919;border:1px solid rgba(255,255,255,0.08);border-radius:9px;padding:10px 10px 22px 10px;cursor:grab;position:relative;transition:border-color 0.2s,box-shadow 0.2s,opacity 0.2s;min-height:72px;}
.idea-card:hover{border-color:rgba(255,255,255,0.18);}
.idea-card.dragging{opacity:0.2;transform:scale(0.96);}
.idea-card.trashed{cursor:default;border-color:rgba(248,113,113,0.1);background:#181212;}
.idea-card.glow-reel{border-color:#f97316;box-shadow:0 0 0 1px rgba(249,115,22,0.25),0 0 10px rgba(249,115,22,0.1);}
.idea-card.glow-carousel{border-color:#818cf8;box-shadow:0 0 0 1px rgba(129,140,248,0.25),0 0 10px rgba(129,140,248,0.1);}
.idea-card.glow-story{border-color:#34d399;box-shadow:0 0 0 1px rgba(52,211,153,0.25),0 0 10px rgba(52,211,153,0.1);}

.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
.badge{font-size:9px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;padding:2px 6px;border-radius:12px;}
.badge-reel{background:rgba(249,115,22,0.15);color:#f97316;border:1px solid rgba(249,115,22,0.35);}
.badge-carousel{background:rgba(129,140,248,0.15);color:#818cf8;border:1px solid rgba(129,140,248,0.35);}
.badge-story{background:rgba(52,211,153,0.15);color:#34d399;border:1px solid rgba(52,211,153,0.35);}
.card-menu-btn{background:transparent;border:none;color:#444;cursor:pointer;font-size:13px;line-height:1;padding:0 2px;opacity:0;transition:opacity 0.15s;font-family:inherit;}
.idea-card:hover .card-menu-btn{opacity:1;}
.card-menu-btn:hover{color:#f0ede8;}

.idea-preview{font-size:12px;line-height:1.45;color:#ccc;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.card-emoji{position:absolute;bottom:6px;right:8px;font-size:13px;opacity:0.45;pointer-events:none;line-height:1;}
.card-click-hint{position:absolute;bottom:6px;left:10px;font-size:9px;color:#383838;pointer-events:none;}

/* ── RIGHT ── */
.right{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;}
.cal-header{padding:16px 20px 12px;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:space-between;}
.month-nav{display:flex;align-items:center;gap:10px;}
.nav-btn{background:#1c1c1c;border:1px solid rgba(255,255,255,0.1);color:#f0ede8;border-radius:6px;width:28px;height:28px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:border-color 0.15s;font-family:inherit;}
.nav-btn:hover{border-color:#c8f565;}
.month-label{font-size:15px;font-weight:600;min-width:150px;text-align:center;}
.legend{display:flex;gap:12px;align-items:center;}
.leg-item{display:flex;align-items:center;gap:4px;font-size:10px;color:#555;}

.cal-wrap{flex:1;overflow-y:auto;padding:10px 16px 16px;}
.dow-row{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:5px;}
.dow{font-size:9px;text-transform:uppercase;letter-spacing:0.1em;color:#3a3a3a;text-align:center;padding:3px 0;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}

.cal-day{background:#191919;border:1px solid rgba(255,255,255,0.06);border-radius:8px;min-height:82px;padding:5px 6px;display:flex;flex-direction:column;gap:2px;transition:border-color 0.15s,background 0.15s;position:relative;overflow:hidden;cursor:pointer;}
.cal-day.other-month{opacity:0.15;pointer-events:none;}
.cal-day.is-today{border-color:#c8f565;}
.cal-day.drag-over{border-color:rgba(200,245,101,0.5);background:rgba(200,245,101,0.03);}
.cal-day.is-done{background:#111a12;border-color:rgba(52,211,153,0.25);}
.cal-day:not(.other-month):hover{border-color:rgba(255,255,255,0.16);}

.day-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px;flex-shrink:0;}
.day-num{font-size:10px;color:#4a4a4a;font-weight:500;line-height:1;}
.cal-day.is-today .day-num{color:#c8f565;font-weight:700;}
.cal-day.is-done .day-num{color:#34d399;}
.done-btn{background:transparent;border:1px solid rgba(255,255,255,0.06);border-radius:3px;color:#383838;cursor:pointer;font-size:8px;padding:1px 4px;font-family:inherit;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;transition:all 0.15s;line-height:1.4;white-space:nowrap;}
.done-btn:hover{border-color:#34d399;color:#34d399;}
.cal-day.is-done .done-btn{background:rgba(52,211,153,0.12);border-color:rgba(52,211,153,0.4);color:#34d399;}

.cal-card{border-radius:4px;padding:2px 5px;font-size:10px;line-height:1.35;display:flex;align-items:center;gap:3px;cursor:grab;width:100%;overflow:hidden;flex-shrink:0;}
.cal-card.type-reel{background:rgba(249,115,22,0.13);color:#f97316;border-left:2px solid #f97316;}
.cal-card.type-carousel{background:rgba(129,140,248,0.13);color:#818cf8;border-left:2px solid #818cf8;}
.cal-card.type-story{background:rgba(52,211,153,0.13);color:#34d399;border-left:2px solid #34d399;}
.cal-card.cal-dragging{opacity:0.25;}
.cal-card-emoji{font-size:9px;flex-shrink:0;}
.cal-card-text{flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;min-width:0;}
.cal-remove{background:transparent;border:none;color:inherit;cursor:pointer;font-size:9px;opacity:0;padding:0;line-height:1;flex-shrink:0;transition:opacity 0.15s;font-family:inherit;}
.cal-card:hover .cal-remove{opacity:0.7;}
.cal-remove:hover{opacity:1!important;}
.more-badge{font-size:8px;color:#555;padding:1px 0 0 3px;flex-shrink:0;}
.done-tick{position:absolute;bottom:4px;right:5px;font-size:12px;color:#34d399;opacity:0.15;pointer-events:none;}

/* ── DETAIL PANEL (shared for day + idea) ── */
.detail-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.55);z-index:100;display:none;align-items:flex-start;justify-content:flex-end;}
.detail-overlay.open{display:flex;}
.detail-panel{width:360px;height:100%;background:#161616;border-left:1px solid rgba(255,255,255,0.08);display:flex;flex-direction:column;overflow:hidden;}
.detail-header{padding:16px 16px 12px;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.detail-title{font-size:13px;font-weight:600;color:#f0ede8;}
.detail-close{background:transparent;border:1px solid rgba(255,255,255,0.1);color:#666;border-radius:5px;width:26px;height:26px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;font-family:inherit;}
.detail-close:hover{border-color:#f0ede8;color:#f0ede8;}

.detail-done-row{padding:8px 16px;border-bottom:1px solid rgba(255,255,255,0.05);flex-shrink:0;}
.detail-done-btn{background:transparent;border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:#555;cursor:pointer;font-size:10px;padding:5px 12px;font-family:inherit;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;transition:all 0.15s;width:100%;}
.detail-done-btn:hover{border-color:#34d399;color:#34d399;}
.detail-done-btn.active{background:rgba(52,211,153,0.12);border-color:#34d399;color:#34d399;}

.detail-body{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:14px;}
.detail-empty{color:#3a3a3a;font-size:12px;text-align:center;padding-top:30px;line-height:1.8;}

/* single content card in detail */
.detail-card{background:#1f1f1f;border-radius:9px;padding:13px;border:1px solid rgba(255,255,255,0.07);}
.detail-card.dc-reel{border-left:3px solid #f97316;}
.detail-card.dc-carousel{border-left:3px solid #818cf8;}
.detail-card.dc-story{border-left:3px solid #34d399;}
.detail-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;}
.detail-type-picker{display:flex;gap:4px;}
.type-mini{font-size:9px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;padding:3px 7px;border-radius:12px;cursor:pointer;border:1px solid rgba(255,255,255,0.07);transition:all 0.15s;font-family:inherit;background:transparent;}
.type-mini.tm-reel{color:rgba(249,115,22,0.4);}
.type-mini.tm-carousel{color:rgba(129,140,248,0.4);}
.type-mini.tm-story{color:rgba(52,211,153,0.4);}
.type-mini.tm-reel.sel{background:rgba(249,115,22,0.15);color:#f97316;border-color:rgba(249,115,22,0.4);}
.type-mini.tm-carousel.sel{background:rgba(129,140,248,0.15);color:#818cf8;border-color:rgba(129,140,248,0.4);}
.type-mini.tm-story.sel{background:rgba(52,211,153,0.15);color:#34d399;border-color:rgba(52,211,153,0.4);}
.type-mini:not(.sel):hover{opacity:0.8;border-color:rgba(255,255,255,0.15);}

.detail-card-actions{display:flex;gap:6px;}
.detail-action-btn{background:transparent;border:1px solid rgba(255,255,255,0.07);color:#444;cursor:pointer;font-size:10px;padding:3px 8px;border-radius:4px;transition:all 0.15s;font-family:inherit;white-space:nowrap;}
.detail-action-btn:hover{border-color:rgba(255,255,255,0.18);color:#f0ede8;}
.detail-action-btn.danger:hover{border-color:#f87171;color:#f87171;}

.field-label{font-size:9px;text-transform:uppercase;letter-spacing:0.1em;color:#444;margin-bottom:4px;font-weight:600;}
.detail-textarea{width:100%;background:#141414;border:1px solid rgba(255,255,255,0.07);border-radius:6px;color:#f0ede8;font-size:12px;padding:7px 9px;resize:none;font-family:inherit;line-height:1.5;outline:none;margin-bottom:10px;}
.detail-textarea:focus{border-color:rgba(200,245,101,0.35);}
.detail-textarea::placeholder{color:#2a2a2a;}
.save-row{display:flex;align-items:center;gap:8px;}
.detail-save{background:#c8f565;color:#0d0d0d;border:none;border-radius:6px;font-size:11px;font-weight:700;padding:6px 14px;cursor:pointer;font-family:inherit;transition:opacity 0.15s;}
.detail-save:hover{opacity:0.85;}
.saved-flash{font-size:10px;color:#34d399;opacity:0;transition:opacity 0.3s;}
.saved-flash.show{opacity:1;}
</style>
</head>
<body>
<div class="app">

<!-- ── LEFT ── -->
<div class="left">
  <div class="left-header">
    <div class="section-label">Idea bank</div>
    <div class="type-tabs">
      <button class="type-tab active-reel" data-type="reel" onclick="selectType('reel')">Reel</button>
      <button class="type-tab" data-type="carousel" onclick="selectType('carousel')">Carousel</button>
      <button class="type-tab" data-type="story" onclick="selectType('story')">Story</button>
    </div>
    <textarea class="new-idea-input" id="ideaText" rows="2" placeholder="Nápad na obsah..." onkeydown="if((event.metaKey||event.ctrlKey)&&event.key==='Enter')addIdea()"></textarea>
    <textarea class="new-idea-input" id="ideaNote" rows="1" placeholder="Poznámka (volitelné)..."></textarea>
    <button class="add-btn" onclick="addIdea()">+ Přidat nápad</button>
  </div>
  <div class="view-toggle">
    <button class="view-btn active" id="btnIdeas" onclick="setView('ideas')">Nápady <span class="pill" id="ideasCount">0</span></button>
    <button class="view-btn" id="btnTrash" onclick="setView('trash')">Koš <span class="pill red" id="trashCount">0</span></button>
  </div>
  <div class="ideas-grid" id="ideasGrid"></div>
</div>

<!-- ── RIGHT ── -->
<div class="right">
  <div class="cal-header">
    <div class="month-nav">
      <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
      <div class="month-label" id="monthLabel"></div>
      <button class="nav-btn" onclick="changeMonth(1)">›</button>
    </div>
    <div class="legend">
      <div class="leg-item"><span style="font-size:11px">🎬</span>Reel</div>
      <div class="leg-item"><span style="font-size:11px">📷</span>Carousel</div>
      <div class="leg-item"><span style="font-size:11px">🤳</span>Story</div>
      <div class="leg-item" style="margin-left:2px"><div style="width:7px;height:7px;border-radius:2px;background:rgba(52,211,153,0.2);border:1px solid #34d399"></div>Done</div>
    </div>
  </div>
  <div class="cal-wrap">
    <div class="dow-row">
      <div class="dow">Po</div><div class="dow">Út</div><div class="dow">St</div>
      <div class="dow">Čt</div><div class="dow">Pá</div><div class="dow">So</div><div class="dow">Ne</div>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>

  <!-- DETAIL OVERLAY -->
  <div class="detail-overlay" id="detailOverlay" onclick="handleOverlayClick(event)">
    <div class="detail-panel" id="detailPanel">
      <div class="detail-header">
        <div class="detail-title" id="detailTitle"></div>
        <button class="detail-close" onclick="closeDetail()">✕</button>
      </div>
      <div id="detailDoneRow"></div>
      <div class="detail-body" id="detailBody"></div>
    </div>
  </div>
</div>

</div><!-- .app -->

<script>
const MONTHS=["Leden","Únor","Březen","Duben","Květen","Červen","Červenec","Srpen","Září","Říjen","Listopad","Prosinec"];
const MONTHS_GEN=["ledna","února","března","dubna","května","června","července","srpna","září","října","listopadu","prosince"];
const TYPES=['reel','carousel','story'];
const TYPE_EMOJI={reel:'🎬',carousel:'📷',story:'🤳'};

let selectedType='reel', nextId=10, currentView='ideas';
const today=new Date();
let curMonth=today.getMonth(), curYear=today.getFullYear();
let drag={id:null,fromDate:null};
// detail mode: {mode:'day', dateKey} or {mode:'idea', ideaId}
let detailCtx=null;

let ideas=JSON.parse(localStorage.getItem('cp_ideas')||'null')||[
  {id:1,type:'reel',text:'Morning routine — timelapse z 5:30 vstupu do gymu',note:'Hudba: lo-fi house',scheduledDate:null,trashed:false},
  {id:2,type:'carousel',text:'5 věcí co mi změnily kompozici těla za rok',note:'',scheduledDate:null,trashed:false},
  {id:3,type:'story',text:'Q&A — co jím před tréninkem',note:'',scheduledDate:null,trashed:false},
];
let scheduled=JSON.parse(localStorage.getItem('cp_scheduled')||'{}');
let doneDays=JSON.parse(localStorage.getItem('cp_done')||'{}');

function save(){
  localStorage.setItem('cp_ideas',JSON.stringify(ideas));
  localStorage.setItem('cp_scheduled',JSON.stringify(scheduled));
  localStorage.setItem('cp_done',JSON.stringify(doneDays));
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function selectType(t){
  selectedType=t;
  document.querySelectorAll('.type-tab').forEach(b=>{b.className='type-tab';if(b.dataset.type===t)b.classList.add('active-'+t);});
}
function setView(v){
  currentView=v;
  document.getElementById('btnIdeas').classList.toggle('active',v==='ideas');
  document.getElementById('btnTrash').classList.toggle('active',v==='trash');
  renderIdeas();
}
function addIdea(){
  const text=document.getElementById('ideaText').value.trim();
  if(!text)return;
  const note=document.getElementById('ideaNote').value.trim();
  ideas.unshift({id:nextId++,type:selectedType,text,note,scheduledDate:null,trashed:false});
  document.getElementById('ideaText').value='';
  document.getElementById('ideaNote').value='';
  save();renderIdeas();
}

function changeIdeaType(id,newType){
  const idea=ideas.find(i=>i.id===id);
  if(!idea||idea.type===newType)return;
  idea.type=newType;
  Object.keys(scheduled).forEach(k=>{scheduled[k].forEach(e=>{if(e.id===id)e.type=newType;});});
  save();renderIdeas();renderCalendar();refreshDetail();
}
function trashIdea(id){
  const idea=ideas.find(i=>i.id===id);
  if(!idea)return;
  idea.trashed=true;
  if(idea.scheduledDate){
    scheduled[idea.scheduledDate]=(scheduled[idea.scheduledDate]||[]).filter(s=>s.id!==id);
    if(!scheduled[idea.scheduledDate].length)delete scheduled[idea.scheduledDate];
    idea.scheduledDate=null;
  }
  save();renderIdeas();renderCalendar();refreshDetail();
}
function restoreIdea(id){
  const idea=ideas.find(i=>i.id===id);
  if(!idea)return;
  idea.trashed=false;
  save();renderIdeas();refreshDetail();
}
function deleteForever(id){
  if(!confirm('Trvale smazat? Nejde vrátit.'))return;
  ideas=ideas.filter(i=>i.id!==id);
  Object.keys(scheduled).forEach(k=>{scheduled[k]=scheduled[k].filter(s=>s.id!==id);if(!scheduled[k].length)delete scheduled[k];});
  save();renderIdeas();renderCalendar();refreshDetail();
}
function removeFromCal(dateKey,id){
  scheduled[dateKey]=(scheduled[dateKey]||[]).filter(s=>s.id!==id);
  if(!scheduled[dateKey].length)delete scheduled[dateKey];
  const idea=ideas.find(i=>i.id===id);
  if(idea)idea.scheduledDate=null;
  save();renderIdeas();renderCalendar();refreshDetail();
}
function toggleDone(e,dateKey){
  e.stopPropagation();
  doneDays[dateKey]=!doneDays[dateKey];
  if(!doneDays[dateKey])delete doneDays[dateKey];
  save();renderCalendar();
  if(detailCtx&&detailCtx.mode==='day'&&detailCtx.dateKey===dateKey)renderDetailDoneBtn();
}

// ── DRAG ──
function onIdeaDragStart(e,id){
  drag={id,fromDate:null};
  setTimeout(()=>{const el=document.querySelector(`.idea-card[data-id="${id}"]`);if(el)el.classList.add('dragging');},0);
}
function onIdeaDragEnd(){drag={id:null,fromDate:null};document.querySelectorAll('.idea-card').forEach(c=>c.classList.remove('dragging'));}
function onCalDragStart(e,id,fromDate){
  drag={id,fromDate};e.stopPropagation();
  setTimeout(()=>{const el=document.querySelector(`.cal-card[data-id="${id}"]`);if(el)el.classList.add('cal-dragging');},0);
}
function onCalDragEnd(){drag={id:null,fromDate:null};document.querySelectorAll('.cal-card').forEach(c=>c.classList.remove('cal-dragging'));}
function onDrop(e,toDateKey){
  e.stopPropagation();
  if(!drag.id)return;
  const id=drag.id,fromDate=drag.fromDate;
  const idea=ideas.find(i=>i.id===id);
  if(!idea||idea.trashed){drag={id:null,fromDate:null};return;}
  if(fromDate){
    scheduled[fromDate]=(scheduled[fromDate]||[]).filter(s=>s.id!==id);
    if(!scheduled[fromDate].length)delete scheduled[fromDate];
    idea.scheduledDate=null;
  } else {
    if(idea.scheduledDate){
      scheduled[idea.scheduledDate]=(scheduled[idea.scheduledDate]||[]).filter(s=>s.id!==id);
      if(!scheduled[idea.scheduledDate].length)delete scheduled[idea.scheduledDate];
      idea.scheduledDate=null;
    }
  }
  const already=(scheduled[toDateKey]||[]).some(s=>s.id===id);
  if(!already){
    if(!scheduled[toDateKey])scheduled[toDateKey]=[];
    scheduled[toDateKey].push({id:idea.id,type:idea.type,text:idea.text});
    idea.scheduledDate=toDateKey;
  }
  drag={id:null,fromDate:null};
  save();renderIdeas();renderCalendar();refreshDetail();
}

// ── DETAIL ──
function openDayDetail(dateKey){
  detailCtx={mode:'day',dateKey};
  const parts=dateKey.split('-');
  const d=parseInt(parts[2]),m=parseInt(parts[1])-1;
  document.getElementById('detailTitle').textContent=`${d}. ${MONTHS_GEN[m]}`;
  renderDetailDoneBtn();
  renderDetailBody();
  document.getElementById('detailOverlay').classList.add('open');
}
function openIdeaDetail(id){
  detailCtx={mode:'idea',ideaId:id};
  document.getElementById('detailTitle').textContent='Detail nápadu';
  document.getElementById('detailDoneRow').innerHTML='';
  renderDetailBody();
  document.getElementById('detailOverlay').classList.add('open');
}
function closeDetail(){
  document.getElementById('detailOverlay').classList.remove('open');
  detailCtx=null;
}
function handleOverlayClick(e){if(e.target===document.getElementById('detailOverlay'))closeDetail();}
function refreshDetail(){if(detailCtx)renderDetailBody();}

function renderDetailDoneBtn(){
  if(!detailCtx||detailCtx.mode!=='day')return;
  const dateKey=detailCtx.dateKey;
  const isDone=!!doneDays[dateKey];
  document.getElementById('detailDoneRow').innerHTML=`
    <div class="detail-done-row">
      <button class="detail-done-btn${isDone?' active':''}" onclick="toggleDetailDone()">
        ${isDone?'✓ Splněno — klikni pro vrácení':'Označit jako Done'}
      </button>
    </div>`;
}
function toggleDetailDone(){
  if(!detailCtx||detailCtx.mode!=='day')return;
  const dk=detailCtx.dateKey;
  doneDays[dk]=!doneDays[dk];
  if(!doneDays[dk])delete doneDays[dk];
  save();renderCalendar();renderDetailDoneBtn();
}

function renderDetailBody(){
  const body=document.getElementById('detailBody');
  if(!detailCtx){body.innerHTML='';return;}

  if(detailCtx.mode==='idea'){
    const idea=ideas.find(i=>i.id===detailCtx.ideaId);
    if(!idea){body.innerHTML='<div class="detail-empty">Nápad nenalezen.</div>';return;}
    body.innerHTML=buildDetailCard(idea, null);
    return;
  }

  // day mode
  const dateKey=detailCtx.dateKey;
  const entries=(scheduled[dateKey]||[]).filter(e=>{const idea=ideas.find(i=>i.id===e.id);return idea&&!idea.trashed;});
  if(!entries.length){
    body.innerHTML='<div class="detail-empty">Žádný obsah na tento den.<br>Přetáhni sem nápad z idea banku nebo jiného dne.</div>';
    return;
  }
  body.innerHTML=entries.map(entry=>{
    const idea=ideas.find(i=>i.id===entry.id);
    return idea?buildDetailCard(idea, dateKey):'';
  }).join('');
}

function buildDetailCard(idea, dateKey){
  const typePicker=TYPES.map(t=>`
    <button class="type-mini tm-${t}${idea.type===t?' sel':''}"
      onclick="changeIdeaType(${idea.id},'${t}')">${t.charAt(0).toUpperCase()+t.slice(1)}</button>
  `).join('');
  const removeBtn=dateKey
    ?`<button class="detail-action-btn danger" onclick="removeFromCal('${esc(dateKey)}',${idea.id})" title="Vrátit do nápady">✕ Odebrat</button>`
    :`<button class="detail-action-btn danger" onclick="trashIdea(${idea.id})">🗑 Koš</button>`;
  return`<div class="detail-card dc-${esc(idea.type)}" id="dc-${idea.id}">
    <div class="detail-card-header">
      <div class="detail-type-picker">${typePicker}</div>
      <div class="detail-card-actions">${removeBtn}</div>
    </div>
    <div class="field-label">Popis</div>
    <textarea class="detail-textarea" rows="3" id="dt-text-${idea.id}" placeholder="Popis...">${esc(idea.text)}</textarea>
    <div class="field-label">Poznámka</div>
    <textarea class="detail-textarea" rows="2" id="dt-note-${idea.id}" placeholder="Poznámka...">${esc(idea.note||'')}</textarea>
    <div class="save-row">
      <button class="detail-save" onclick="saveDetailCard(${idea.id})">Uložit</button>
      <span class="saved-flash" id="sf-${idea.id}">✓ Uloženo</span>
    </div>
  </div>`;
}

function saveDetailCard(id){
  const idea=ideas.find(i=>i.id===id);
  if(!idea)return;
  const t=document.getElementById(`dt-text-${id}`);
  const n=document.getElementById(`dt-note-${id}`);
  if(t&&t.value.trim()){
    idea.text=t.value.trim();
    Object.keys(scheduled).forEach(k=>{scheduled[k].forEach(e=>{if(e.id===id)e.text=idea.text;});});
  }
  if(n)idea.note=n.value.trim();
  save();renderIdeas();renderCalendar();
  const sf=document.getElementById(`sf-${id}`);
  if(sf){sf.classList.add('show');setTimeout(()=>sf.classList.remove('show'),1800);}
}

// ── RENDER IDEAS ──
function renderIdeas(){
  const grid=document.getElementById('ideasGrid');
  const active=ideas.filter(i=>!i.trashed&&!i.scheduledDate); // hide scheduled from bank
  const trashed=ideas.filter(i=>i.trashed);
  const allActive=ideas.filter(i=>!i.trashed);
  document.getElementById('ideasCount').textContent=allActive.length;
  document.getElementById('trashCount').textContent=trashed.length;

  const pool=currentView==='trash'?trashed:active;
  if(!pool.length){
    grid.innerHTML=currentView==='trash'
      ?'<div class="empty-msg">Koš je prázdný 🎉</div>'
      :'<div class="empty-msg">Žádné volné nápady.<br>Přidej nový nebo přesuň<br>z kalendáře zpět.</div>';
    return;
  }
  grid.innerHTML=pool.map(idea=>`
    <div class="idea-card${idea.trashed?'':' glow-'+idea.type}${idea.trashed?' trashed':''}"
      ${!idea.trashed?`draggable="true" ondragstart="onIdeaDragStart(event,${idea.id})" ondragend="onIdeaDragEnd()"`:``}
      data-id="${idea.id}"
      onclick="openIdeaDetail(${idea.id})">
      <div class="card-top">
        <span class="badge badge-${esc(idea.type)}">${esc(idea.type)}</span>
        <button class="card-menu-btn" onclick="event.stopPropagation();${idea.trashed?`restoreIdea(${idea.id})`:`trashIdea(${idea.id})`}" title="${idea.trashed?'Obnovit':'Koš'}">${idea.trashed?'↩':'🗑'}</button>
      </div>
      <div class="idea-preview">${esc(idea.text)}</div>
      <div class="card-click-hint">klikni pro detail</div>
      ${!idea.trashed?`<div class="card-emoji">${TYPE_EMOJI[idea.type]}</div>`:''}
    </div>
  `).join('');
}

// ── RENDER CALENDAR ──
function changeMonth(dir){
  curMonth+=dir;
  if(curMonth>11){curMonth=0;curYear++;}
  if(curMonth<0){curMonth=11;curYear--;}
  renderCalendar();
}

function renderCalendar(){
  document.getElementById('monthLabel').textContent=MONTHS[curMonth]+' '+curYear;
  const firstDay=new Date(curYear,curMonth,1);
  let startDow=firstDay.getDay();
  startDow=startDow===0?6:startDow-1;
  const daysInMonth=new Date(curYear,curMonth+1,0).getDate();
  const prevDays=new Date(curYear,curMonth,0).getDate();
  let cells=[];
  for(let i=startDow-1;i>=0;i--)cells.push({day:prevDays-i,current:false});
  for(let d=1;d<=daysInMonth;d++)cells.push({day:d,current:true});
  while(cells.length%7!==0)cells.push({day:cells.length-daysInMonth-startDow+1,current:false});

  const MAX=2;
  document.getElementById('calGrid').innerHTML=cells.map(cell=>{
    if(!cell.current)return`<div class="cal-day other-month"><div class="day-top"><div class="day-num">${cell.day}</div></div></div>`;
    const dateKey=`${curYear}-${String(curMonth+1).padStart(2,'0')}-${String(cell.day).padStart(2,'0')}`;
    const isToday=today.getDate()===cell.day&&today.getMonth()===curMonth&&today.getFullYear()===curYear;
    const isDone=!!doneDays[dateKey];
    const allEntries=(scheduled[dateKey]||[]).filter(e=>{const idea=ideas.find(i=>i.id===e.id);return idea&&!idea.trashed;});
    const visible=allEntries.slice(0,MAX);
    const extra=allEntries.length-visible.length;
    const cards=visible.map(e=>`
      <div class="cal-card type-${esc(e.type)}" data-id="${e.id}"
        draggable="true"
        ondragstart="onCalDragStart(event,${e.id},'${dateKey}')"
        ondragend="onCalDragEnd()"
        onclick="event.stopPropagation();openDayDetail('${dateKey}')">
        <span class="cal-card-emoji">${TYPE_EMOJI[e.type]}</span>
        <span class="cal-card-text">${esc(e.text)}</span>
        <button class="cal-remove" onclick="event.stopPropagation();removeFromCal('${esc(dateKey)}',${e.id})" title="Vrátit do nápady">✕</button>
      </div>`).join('');
    const extraBadge=extra>0?`<div class="more-badge">+${extra}</div>`:'';
    return`<div class="cal-day${isToday?' is-today':''}${isDone?' is-done':''}"
      ondragover="event.preventDefault();this.classList.add('drag-over')"
      ondragleave="this.classList.remove('drag-over')"
      ondrop="this.classList.remove('drag-over');onDrop(event,'${dateKey}')"
      onclick="openDayDetail('${dateKey}')">
      <div class="day-top">
        <div class="day-num">${cell.day}</div>
        <button class="done-btn" onclick="toggleDone(event,'${dateKey}')">${isDone?'✓':'Done'}</button>
      </div>
      ${cards}${extraBadge}
      ${isDone?'<div class="done-tick">✓</div>':''}
    </div>`;
  }).join('');
}

renderIdeas();
renderCalendar();
</script>
